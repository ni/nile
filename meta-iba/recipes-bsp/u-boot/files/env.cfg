# Enable Redundant Raw MMC Storage
CONFIG_ENV_IS_IN_MMC=y
CONFIG_SYS_REDUNDAND_ENVIRONMENT=y
# CONFIG_ENV_IS_IN_FAT is not set
# CONFIG_ENV_IS_IN_SPI_FLASH is not set
# CONFIG_ENV_IS_NOWHERE is not set

# Define Size and Offsets
# These values must also be reflected in fw_env.config
CONFIG_ENV_SIZE=0x8000
CONFIG_ENV_OFFSET=0x80000
CONFIG_ENV_OFFSET_REDUND=0xC0000
CONFIG_SYS_MMC_ENV_DEV=0

# Enable "env info" sub-command for use below
CONFIG_CMD_NVEDIT_INFO=y

# Populate env storage on boot, if empty
CONFIG_USE_PREBOOT=y
CONFIG_PREBOOT="if env info -d -q; then saveenv; fi"
